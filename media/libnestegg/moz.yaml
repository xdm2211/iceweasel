vendoring:
  url: https://github.com/mozilla/nestegg
  source-hosting: github
  vendor-directory: media/libnestegg
  skip-vendoring-steps:
    - update-moz-build
  exclude:
    - configure.ac
    - docs
    - INSTALL
    - m4
    - Makefile.am
    - nestegg.pc.in
    - nestegg-uninstalled.pc.in
    - test
    - TODO
  keep:
    - include/moz.build
    - src/moz.build

updatebot:
  maintainer-phab: kinetik
  maintainer-bz: kinetik@flim.org
  fuzzy-query: media
  tasks:
    - type: vendoring
      enabled: True
      frequency: every

