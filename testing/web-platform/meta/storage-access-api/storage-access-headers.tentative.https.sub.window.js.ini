prefs: [dom.storage_access.headers.enabled:true]
[storage-access-headers.tentative.https.sub.window.html]
  expected:
    if not tsan and (os == "android") and debug: [TIMEOUT, OK]
    if tsan: [TIMEOUT, OK]
  [Sec-Fetch-Storage-Access maintains value on same-origin redirect.]
    expected: FAIL

  [Sec-Fetch-Storage-Access is not 'active' after cross-origin same-site redirection.]
    expected:
      if tsan: TIMEOUT
      FAIL

  [Sec-Fetch-Storage-Access loses value on a cross-site redirection.]
    expected:
      if not tsan and (os == "android") and debug and sessionHistoryInParent: [TIMEOUT, FAIL]
      if not tsan and (os == "android") and debug and not sessionHistoryInParent: TIMEOUT
      if tsan: [NOTRUN, FAIL, TIMEOUT]
      FAIL

  [Sec-Fetch-Storage-Access is `active` after a valid retry with matching explicit allowed-origin.]
    expected:
      if os == "win": PASS
      if os == "mac": PASS
      if os == "linux": PASS
      [PASS, FAIL]

  [Activate-Storage-Access retry is handled before any redirects are followed.]
    expected:
      if (os == "android") and debug and sessionHistoryInParent: [NOTRUN, PASS, FAIL, TIMEOUT]
      if (os == "android") and debug and not sessionHistoryInParent: [NOTRUN, PASS, FAIL, TIMEOUT]
      if (os == "android") and not debug and sessionHistoryInParent: [PASS, FAIL, TIMEOUT, NOTRUN]
      if (os == "android") and not debug and not sessionHistoryInParent: [PASS, FAIL, TIMEOUT, NOTRUN]
      if (os == "linux") and tsan: [NOTRUN, PASS]

  [Sec-Fetch-Storage-Access is active after retry with wildcard `allowed-origin` value.]
    expected:
      if os == "win": PASS
      if os == "mac": PASS
      if os == "linux": PASS
      [PASS, FAIL]
