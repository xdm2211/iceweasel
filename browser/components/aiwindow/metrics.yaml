# Adding a new metric? We have docs for that!
# https://firefox-source-docs.mozilla.org/toolkit/components/glean/user/new_definitions_file.html

---
$schema: moz://mozilla.org/schemas/glean/metrics/2-0-0
$tags:
  - "Core :: Machine Learning"

smart_window:
  chat_submit:
    type: event
    description: |
      Recorded when the user submits a chat entry
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2015626
    data_reviews:
      - https://phabricator.services.mozilla.com/D282873
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      chat_id: &chat_id
        type: string
        description: >
          UUID for this smart window session. Unique identifier for each chat conversation

  # Chat Assistant
  chat_previous_session:
    type: event
    description: |
      User clicks on previous session button
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      tabs:
        type: quantity
        unit: count
        description: >
          Number of tabs restored

  history_displayed:
    type: event
    description: |
      Results from Ask History are displayed to the user
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: &location
        type: string
        description: >
          Which input was used to request history: fullpage, sidebar, or urlbar
      chat_id: *chat_id
      message_seq: &message_seq
        type: quantity
        unit: count
        description: >
          Number of messages in that chat
      total: &total
        type: quantity
        unit: count
        description: >
          Number of history entries displayed
      reason: &history_reason
        type: string
        description: >
          What triggered the history display: ask or restore

  history_click:
    type: event
    description: |
      User clicks on a history result
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq
      total: *total
      position: &position
        type: quantity
        unit: count
        description: >
          Position of the entry that was clicked

  chat_retrieved:
    type: event
    description: |
      User retrieves a chat from history
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      num_messages: &num_messages
        type: quantity
        unit: count
        description: >
          Number of messages in that chat.
      time_delta:
        type: quantity
        unit: minutes
        description: >
          Elapsed time in minutes between chat session completion and retrieval

  quick_prompt_displayed:
    type: event
    description: |
      User is presented with one or more quick prompts
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D282482
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq
      prompts:
        type: quantity
        unit: count
        description: >
          Number of prompts displayed

  quick_prompt_clicked:
    type: event
    description: |
      Recorded when the user selects a prompt suggestion in smart window mode
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D282482
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq
      starter: &starter
        type: boolean
        description: >
          Boolean indicating if the prompt is a conversation starter, as opposed to a follow-up

  get_page_content:
    type: event
    description: |
      Browser reads the contents of a tab to include in chat result
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq
      length:
        type: quantity
        unit: count
        description: >
          Number of characters read from the page
      time:
        type: quantity
        unit: ms
        description: >
          Time to process the request

  link_click:
    type: event
    description: |
      User clicks a link within the response
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq

  memory_removed_panel:
    type: event
    description: |
      User removes a single memory from the memories panel
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      memories:
        type: quantity
        unit: count
        description: >
          Total number of memories still present after the removal
      trigger:
        type: string
        description: >
          The location where the removal occurred (assistant, settings)

  memory_applied:
    type: event
    description: |
      Triggered when a memory is used as part of query to provide response/results to user
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq

  memory_applied_click:
    type: event
    description: |
      User clicks on memories applied tooltip
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq

  retry_no_memories:
    type: event
    description: |
      User selects retry without memories
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq

  memories_toggle:
    type: event
    description: |
      Recorded when the user clicks the toggle to turn memories on or off for that chat
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2022629
    data_reviews:
      - https://phabricator.services.mozilla.com/D287197
    data_sensitivity:
      - interaction
    notification_emails:
      - npodgurski@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq
      memories:
        type: quantity
        unit: count
        description: >
          Total number of memories available
      toggle: &toggle
        type: boolean
        description: >
          Whether the memories feature is enabled or not. True for turning on and false for turning off

  model_request:
    type: event
    description: |
      A request is made to the backend model
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2021947
    data_reviews:
      - https://phabricator.services.mozilla.com/D287710
    data_sensitivity:
      - interaction
    notification_emails:
      - gcardieri@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq
      request_id: &request_id
        type: string
        description: >
          Identifier to be used to cross reference with backend telemetry
      detected_intent:
        type: string
        description: >
          What was the detected intent for the request navigate, search, chat, or action
      intent: &intent
        type: string
        description: >
          Intent of the request
      tokens: &tokens
        type: quantity
        unit: count
        description: >
          number of tokens processed to fulfill the request
      memories:
        type: quantity
        unit: count
        description: >
          Number of memories included in the response

  model_response:
    type: event
    description: |
      A response is received from the backend model
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2021947
    data_reviews:
      - https://phabricator.services.mozilla.com/D287710
    data_sensitivity:
      - interaction
    notification_emails:
      - gcardieri@mozilla.com
    expires: never
    extra_keys:
      location: *location
      chat_id: *chat_id
      message_seq: *message_seq
      request_id: *request_id
      intent: *intent
      tokens: *tokens
      memories:
        type: quantity
        unit: count
        description: >
          Number of memories included in the response
      latency:
        type: quantity
        unit: ms
        description: >
          Time in ms to start processing the request
      duration:
        type: quantity
        unit: ms
        description: >
          Time in ms to process the request
      error: &error
        type: string
        description: >
          Error code if it's not a successful response
      model: &model
        type: string
        description: >
          Model selected by the user

  onboarding_screen_impression:
      type: event
      description: |
        Recorded when onboarding screen is displayed in smart window mode
      bugs:
        - https://bugzilla.mozilla.org/show_bug.cgi?id=2009613
      data_reviews:
        - https://bugzilla.mozilla.org/show_bug.cgi?id=2009613
      data_sensitivity:
        - interaction
      notification_emails:
        - pdahiya@mozilla.com
      extra_keys:
        message_id:
          description: >
            Identifier for the onboarding screen that is displayed, for example
            'AI_WINDOW_WELCOME_0_AI_WINDOW_INTRO_WW' for the welcome screen,
            'AI_WINDOW_WELCOME_1_AI_WINDOW_CHOOSE_MODEL_WW' for the model selection screen
          type: string
      expires: never

  onboarding_model_selected:
    type: event
    description: |
      Recorded when user selects a model for Smart Window during onboarding
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009613
    data_reviews:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009613
    data_sensitivity:
      - interaction
    notification_emails:
      - pdahiya@mozilla.com
    extra_keys:
      model:
        description: >
          Identifier for the model tile clicked by the user during onboarding,
          for example: '1', '2', '3'
        type: string
    expires: never

  onboarding_model_navigate:
    type: event
    description: |
      Recorded when user clicks done on the model selection screen
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009613
    data_reviews:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009613
    data_sensitivity:
      - interaction
    notification_emails:
      - pdahiya@mozilla.com
    extra_keys:
      model:
        description: >
          Identifier for the selected model during onboarding when user clicks done,
          for example: '1', '2', '3'
        type: string
    expires: never

  onboarding_complete:
    type: event
    description: |
      Indicates if user completed onboarding successfully
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009613
    data_reviews:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009613
    data_sensitivity:
      - interaction
    notification_emails:
      - pdahiya@mozilla.com
    expires: never

  open_window:
    type: event
    description: |
      Recorded when a Smart Window is opened
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009610
    data_reviews:
      - https://phabricator.services.mozilla.com/D285902
    data_sensitivity:
      - interaction
    notification_emails:
      - mlucks@mozilla.com
    extra_keys:
      trigger:
        type: string
        description: >
          The reason the Smart Window was opened. One of: switch, menu, new_window, open_browser, or undo_close
      fxa:
        type: boolean
        description: >
          Whether the user is signed in to their Firefox Account
      onboarding:
        type: boolean
        description: >
          Whether the user saw firstrun onboarding when opening Smart Window. True if onboarding has not yet been completed.
    expires: never

  uri_load:
    type: event
    description: |
      User opens a URI in the Smart Window (includes session restore and external link). This event is sent at most once per hour to indicate Smart Window activity.
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009610
    data_reviews:
      - https://phabricator.services.mozilla.com/D285902
    data_sensitivity:
      - interaction
    notification_emails:
      - mlucks@mozilla.com
    extra_keys:
      model:
        type: string
        description: >
          The model choice selected during firstrun, corresponding to the
          model_choice_id in Remote Settings (1, 2, or 3). "custom" if a
          custom model override is set. Empty string if firstrun was not
          completed.
    expires: never

  sidebar_open:
    type: event
    description: |
      Recorded when the Smart Window sidebar is opened
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009610
    data_reviews:
      - https://phabricator.services.mozilla.com/D285902
    data_sensitivity:
      - interaction
    notification_emails:
      - mlucks@mozilla.com
    extra_keys:
      chat_id: *chat_id
      message_seq: &sidebar_message_seq
        type: quantity
        unit: count
        description: >
          Number of messages in the conversation at the time the sidebar was opened or closed
    expires: never

  sidebar_close:
    type: event
    description: |
      Recorded when the Smart Window sidebar is closed
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009610
    data_reviews:
      - https://phabricator.services.mozilla.com/D285902
    data_sensitivity:
      - interaction
    notification_emails:
      - mlucks@mozilla.com
    extra_keys:
      chat_id: *chat_id
      message_seq: *sidebar_message_seq
    expires: never

  tabs_opened:
    type: counter
    description: |
      The number of Smart Window tabs opened in the current ping session
    bugs:
      - https://bugzilla.mozilla.org/show_bug.cgi?id=2009610
    data_reviews:
      - https://phabricator.services.mozilla.com/D285902
    data_sensitivity:
      - interaction
    notification_emails:
      - mlucks@mozilla.com
    expires: never
