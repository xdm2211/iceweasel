[DEFAULT]
firefox-appdir = "browser"
head = "head.js"
run-if = [
  "os == 'win'",
  "os == 'linux'",
]

["test_TaskbarTabsRegistry.js"]
support-files = [
    "test_taskbarTabs.json",
    "test_taskbarTabs_nonames.json",
]

["test_taskbarTabs_existingInstalledCountMetric.js"]

["test_taskbarTabs_iconSaving.js"]
support-files = [
    "../../../places/tests/browser/favicon-normal16.png",
    "../../../../base/content/test/favicons/icon.svg",
]

["test_taskbarTabs_installedCountMetric.js"]

["test_taskbarTabs_pinLinux.js"]
run-if = ["os == 'linux'"]

["test_taskbarTabs_pinMsix.js"]
run-if = ["os == 'win' && msix"]

["test_taskbarTabs_pinWindows.js"]
run-if = ["os == 'win' && !msix"]

["test_taskbarTabs_utils.js"]
support-files = [
    "../../../places/tests/browser/favicon-normal16.png",
    "../../../../base/content/test/favicons/icon.svg",
]
