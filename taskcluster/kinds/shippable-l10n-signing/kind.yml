---
loader: taskgraph.loader.transform:loader

transforms:
    - taskgraph.transforms.from_deps
    - gecko_taskgraph.transforms.name_sanity
    - gecko_taskgraph.transforms.shippable_l10n_signing
    - gecko_taskgraph.transforms.signing
    - gecko_taskgraph.transforms.task

kind-dependencies:
    - shippable-l10n

only-for-attributes:
    - shippable
    - nightly

not-for-build-platforms:
    - macosx64-shippable/opt
    - macosx64-devedition/opt
    - macosx64/opt
    - macosx64/debug

task-defaults:
    run-on-repo-type: [hg]

tasks:
    shippable-l10n-signing:
        from-deps:
            # One might think that using separate tasks per-locale would be faster, but
            # this turns out not to be the case. Due to the overhead of chain of trust
            # verification this roughly doubles total runtime of these tasks.
            group-by: chunk-locales
