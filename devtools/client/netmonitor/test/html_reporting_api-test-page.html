<html>
  <head>
    <meta charset=utf8>
    <script>
      "use strict";

      // Set up reporting observer
      const options = {
        types: ['deprecation'],
        buffered: true
      }

      const observer = new ReportingObserver(function(reports) {
        console.log("Reporting API reports", reports)
      }, options);
      observer.observe();
    </script>
  </head>
  <body>
    <h1>Reporting API</h1>
  </body>
</html>
